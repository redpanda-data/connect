# Salesforce sink write benchmark
# Generates synthetic Account records and upserts them into Salesforce,
# measuring write throughput via the benchmark processor.
#
# Required env vars:
#   export SALESFORCE_ORG_URL="https://your-domain.salesforce.com"
#   export SALESFORCE_CLIENT_ID="your-connected-app-client-id"
#   export SALESFORCE_CLIENT_SECRET="your-connected-app-client-secret"
#
# Optional:
#   export BENCH_WRITE_MODE=realtime  (default: realtime, alternative: bulk)

http:
  debug_endpoints: true

input:
  generate:
    interval: "1ns"
    mapping: |
      let id = counter()

      let first_names = ["Mike", "Sarah", "James", "Emily", "Robert", "Jessica", "David", "Ashley", "John", "Amanda"]
      let last_names  = ["Garcia", "Smith", "Johnson", "Williams", "Brown", "Jones", "Miller", "Davis", "Wilson", "Moore"]
      let salutations = ["Mr.", "Ms.", "Mrs.", "Dr."]
      let streets     = ["500 Howard St", "123 Market St", "456 Mission St", "789 Folsom St", "321 Brannan St"]
      let cities      = ["San Francisco", "Los Angeles", "New York", "Chicago", "Seattle"]
      let states      = ["California", "California", "New York", "Illinois", "Washington"]
      let state_codes = ["CA", "CA", "NY", "IL", "WA"]
      let zip_codes   = ["94105", "90001", "10001", "60601", "98101"]
      let countries   = ["United States"]
      let lead_src    = ["Marketing Event", "Web", "Phone Inquiry", "Partner Referral", "Trade Show"]
      let titles      = ["Customer", "Manager", "Director", "VP", "Engineer"]
      let pronouns    = ["He/Him/His", "She/Her/Hers", "They/Them/Theirs"]

      let city_idx  = $id % $cities.length()
      let first     = $first_names.index($id % $first_names.length())
      let last      = $last_names.index($id % $last_names.length())
      let street    = $streets.index($id % $streets.length())
      let city      = $cities.index($city_idx)
      let state     = $states.index($city_idx)
      let state_code = $state_codes.index($city_idx)
      let zip       = $zip_codes.index($city_idx)
      let country   = $countries.index(0)

      root.topic = "bench-account"
      root.data = {
        "External_ID__c":          "bench-" + $id.string(),
        "FirstName":               $first,
        "LastName":                $last,
        "Salutation":              $salutations.index($id % $salutations.length()),
        "IsPersonAccount":         true,
        "IsActive":                false,
        "RecordTypeId":            "012Hp000002iLwgIAE",
        "Phone":                   "(415) 555-" + ($id % 9000 + 1000).string(),
        "PersonMobilePhone":       "(415) 500-" + ($id % 9000 + 1000).string(),
        "PersonEmail":             $first.lowercase() + "." + $last.lowercase() + $id.string() + "@example.com",
        "PersonTitle":             $titles.index($id % $titles.length()),
        "PersonLeadSource":        $lead_src.index($id % $lead_src.length()),
        "PersonBirthdate":         "1985-06-15",
        "PersonHasOptedOutOfEmail": false,
        "PersonDoNotCall":         false,
        "AccountNumber":           "P" + ($id + 10000000).string(),
        "BillingStreet":           $street,
        "BillingCity":             $city,
        "BillingState":            $state,
        "BillingPostalCode":       $zip,
        "BillingCountry":          $country,
        "BillingStateCode":        $state_code,
        "BillingCountryCode":      "US",
        "ShippingStreet":          $street,
        "ShippingCity":            $city,
        "ShippingState":           $state,
        "ShippingPostalCode":      $zip,
        "ShippingCountry":         $country,
        "ShippingStateCode":       $state_code,
        "ShippingCountryCode":     "US",
        "CurrencyIsoCode":         "USD",
        "SDO_PA_Inclusive_Pronouns__pc": $pronouns.index($id % $pronouns.length()),
        "SDO_Account_Priority__c": "Low Priority",
        "SDO_SPM_Region_Auto_Calc__c": "USA",
        "SDO_SPM_Segment_Auto_Calc__c": "SMB"
      }

pipeline:
  processors:
    - benchmark:
        interval: 1s
        count_bytes: true

output:
  salesforce_sink:
    org_url: "${SALESFORCE_ORG_URL}"
    client_id: "${SALESFORCE_CLIENT_ID}"
    client_secret: "${SALESFORCE_CLIENT_SECRET}"
    restapi_version: "v65.0"
    request_timeout: "30s"
    max_retries: 5
    bulk_batch_size: 1000
    topic_mappings:
      - topic: bench-account
        sobject: Account
        operation: upsert
        external_id_field: External_ID__c
        mode: "${BENCH_WRITE_MODE:realtime}"
        all_or_none: false

metrics:
  prometheus:
    add_process_metrics: true
    add_go_metrics: true
