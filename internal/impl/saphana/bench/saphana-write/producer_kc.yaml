input:
  generate:
    count: ${COUNT:2000000}
    interval: ""
    mapping: |
      let id = counter()
      let cat = ["A","B","C","D"].index(random_int(seed: counter()) % 4)
      let val = (random_int(seed: timestamp_unix_nano()) % 1000000) / 100.0
      root = {
        "schema": {
          "type": "struct",
          "fields": [
            {"type": "int64",   "optional": false, "field": "ID"},
            {"type": "string",  "optional": true,  "field": "CATEGORY"},
            {"type": "double",  "optional": true,  "field": "VALUE"}
          ],
          "optional": false,
          "name": "bench_write"
        },
        "payload": {
          "ID":       $id,
          "CATEGORY": $cat,
          "VALUE":    $val
        }
      }

output:
  kafka_franz:
    seed_brokers:
      - ${KAFKA_BOOTSTRAP:localhost:9092}
    topic: hana-bench-kc-writes
    max_in_flight: 256
    batching:
      count: 10000
      period: 500ms

http:
  address: "0.0.0.0:0"

logger:
  level: WARN
