input:
  generate:
    count: ${COUNT:1000000}
    interval: ""
    mapping: |
      root.id       = counter()
      root.category = ["A","B","C","D"].index(random_int(seed: counter()) % 4)
      root.value    = (random_int(seed: timestamp_unix_nano()) % 1000000) / 100.0
      root.ts       = now()

output:
  kafka_franz:
    seed_brokers:
      - ${KAFKA_BOOTSTRAP:localhost:9092}
    topic: hana-bench-writes
    max_in_flight: 256
    batching:
      count: 10000
      period: 500ms

http:
  address: "0.0.0.0:0"

logger:
  level: WARN
