services:
  kafka-connect:
    build:
      context: ../..
      dockerfile: Dockerfile.connect.sap
    container_name: rpcns-hana-inc-connect
    # host networking so JDBC connections to HANA appear from the host IP
    # (HANA firewalls typically block Docker bridge IPs)
    network_mode: host
    environment:
      CONNECT_BOOTSTRAP_SERVERS: localhost:9092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: rpcns-hana-inc-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _inc-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _inc-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _inc-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/kafka-connect-sap
      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
    volumes:
      - type: bind
        source: ../../ngdbc.jar
        target: /usr/share/kafka-connect-sap/lib/ngdbc.jar
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
