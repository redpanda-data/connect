input:
  sap_hana:
    dsn: ${HANA_DSN}
    mode: incrementing
    schema_name: ${HANA_SCHEMA}
    table: ${HANA_TABLE:BENCH_ORDERS_INC}
    incrementing_column: ID
    incrementing_initial_value: ${HWM_INITIAL:}
    poll_interval: ${POLL_INTERVAL:1s}

output:
  kafka_franz:
    seed_brokers:
      - localhost:9092
    topic: ${KAFKA_TOPIC:rpcns-hana-bench-orders-inc}

http:
  address: "0.0.0.0:0"

logger:
  level: WARN
