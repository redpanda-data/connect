version: "3"

silent: true

vars:
  HANA_DSN: '{{.HANA_DSN | default (env "HANA_DSN")}}'

tasks:
  up:
    desc: Start Kafka
    cmds:
      - docker compose up -d
      - until docker exec rpcns-hana-kafka kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1; do sleep 2; done
      - echo "Kafka ready"

  down:
    desc: Stop and remove containers and volumes
    cmds:
      - docker compose down -v --remove-orphans

  bench:build:
    desc: Build the redpanda-connect and loader binaries
    cmds:
      - go build -o /tmp/rpcns-hana-inc-bench ../../../../../../cmd/redpanda-connect/
      - go build -o /tmp/rpcns-hana-inc-bench-load ./load/
      - echo "Binaries built"

  bench:setup:
    desc: Create empty BENCH_ORDERS_INC table (drop + recreate)
    cmds:
      - |
        if [ -z "$HANA_DSN" ]; then echo "HANA_DSN env var required"; exit 1; fi
        if [ -z "$HANA_SCHEMA" ]; then echo "HANA_SCHEMA env var required"; exit 1; fi
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" /tmp/rpcns-hana-inc-bench-load -setup-only

  bench:load:
    desc: "Insert COUNT rows into BENCH_ORDERS_INC (e.g. task bench:load COUNT=500000 WORKERS=10)"
    vars:
      COUNT: '{{.COUNT | default "500000"}}'
      WORKERS: '{{.WORKERS | default "10"}}'
      BATCH: '{{.BATCH | default "5000"}}'
    cmds:
      - |
        if [ -z "$HANA_DSN" ]; then echo "HANA_DSN env var required"; exit 1; fi
        if [ -z "$HANA_SCHEMA" ]; then echo "HANA_SCHEMA env var required"; exit 1; fi
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -count {{.COUNT}} -workers {{.WORKERS}} -batch {{.BATCH}}

  bench:run:
    desc: "Run incrementing benchmark â€” connector starts first, then rows inserted (e.g. task bench:run COUNT=500000 CORES=4 FETCH_SIZE=10000)"
    vars:
      COUNT: '{{.COUNT | default "500000"}}'
      CORES: '{{.CORES | default ""}}'
      POLL: '{{.POLL | default "1s"}}'
      INTERVAL: '{{.INTERVAL | default "2"}}'
      FETCH_SIZE: '{{.FETCH_SIZE | default "10000"}}'
      BATCH_COUNT: '{{.BATCH_COUNT | default "1000"}}'
      MAX_IN_FLIGHT: '{{.MAX_IN_FLIGHT | default "10"}}'
      WORKERS: '{{.WORKERS | default "10"}}'
    cmds:
      - |
        if [ -z "$HANA_DSN" ]; then echo "HANA_DSN env var required"; exit 1; fi
        if [ -z "$HANA_SCHEMA" ]; then echo "HANA_SCHEMA env var required"; exit 1; fi
        COUNT={{.COUNT}}
        CORES="{{.CORES}}"
        INTERVAL={{.INTERVAL}}
        TOPIC="rpcns-hana-bench-orders-inc"
        CORES_LABEL="${CORES:-unbounded}"

        pkill -9 -f "/tmp/rpcns-hana-inc-bench run" 2>/dev/null || true

        get_kafka_abs() {
          timeout 5 docker exec rpcns-hana-kafka kafka-get-offsets \
            --bootstrap-server localhost:29092 \
            --topic "$TOPIC" 2>/dev/null \
            | awk -F: '{sum += $3} END {print sum+0}' || echo 0
        }

        # Reset table to empty
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" /tmp/rpcns-hana-inc-bench-load -setup-only > /dev/null

        printf "cores=%-10s  fetch=%-8s  poll=%s\n" "$CORES_LABEL" "{{.FETCH_SIZE}}" "{{.POLL}}"

        # Record start offset â€” no topic deletion needed
        START_OFFSET=$(get_kafka_abs)

        # Start connector (polls empty table, establishes HWM=0)
        BENCH_FETCH_SIZE="{{.FETCH_SIZE}}" BENCH_BATCH_COUNT="{{.BATCH_COUNT}}" BENCH_MAX_IN_FLIGHT="{{.MAX_IN_FLIGHT}}" \
          HANA_DSN="$HANA_DSN" HANA_TABLE="BENCH_ORDERS_INC" HANA_SCHEMA="$HANA_SCHEMA" KAFKA_TOPIC="$TOPIC" \
          POLL_INTERVAL="{{.POLL}}" GOMAXPROCS="$CORES" \
          REDPANDA_LICENSE="$REDPANDA_LICENSE" REDPANDA_LICENSE_FILEPATH="$REDPANDA_LICENSE_FILEPATH" \
          /tmp/rpcns-hana-inc-bench run ./benchmark_config.yaml > /tmp/rpcns_hana_inc_bench.log 2>&1 &
        RPCN_PID=$!

        # Wait for connector to connect and complete first poll
        sleep 3

        # Insert rows â€” connector picks them up incrementally
        START=$(date +%s)
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -count "$COUNT" -workers {{.WORKERS}} > /tmp/rpcns_hana_inc_load.log 2>&1 &
        LOAD_PID=$!

        PREV_COUNT=0
        PREV_TIME=$START
        ZEROS=0
        STARTED=0
        START_TIMEOUT=24
        LOAD_DONE=0
        LOAD_DONE_ZEROS=0

        printf "%-10s  %-14s  %s\n" "TIME" "IN KAFKA" "MSG/S"

        while true; do
          sleep "$INTERVAL"
          KAFKA_COUNT=$(( $(get_kafka_abs) - START_OFFSET ))
          KAFKA_COUNT=${KAFKA_COUNT:-0}
          NOW=$(date +%s)

          DELTA_T=$((NOW - PREV_TIME))
          DELTA_COUNT=$((KAFKA_COUNT - PREV_COUNT))
          RATE=0
          [ "$DELTA_T" -gt 0 ] && RATE=$((DELTA_COUNT / DELTA_T))
          printf "%-10s  %-14s  %s msg/s\n" "$(date +%H:%M:%S)" "$KAFKA_COUNT" "$RATE"

          [ "$KAFKA_COUNT" -gt 0 ] && STARTED=1

          # Track when loader finishes so we can apply a longer drain window
          if [ "$LOAD_DONE" -eq 0 ] && ! kill -0 $LOAD_PID 2>/dev/null; then
            LOAD_DONE=1
          fi

          if [ "$STARTED" -eq 0 ]; then
            ZEROS=$((ZEROS + 1))
            if [ "$ZEROS" -ge "$START_TIMEOUT" ]; then
              echo "ERROR: no messages within $((START_TIMEOUT * INTERVAL))s"
              kill -9 $RPCN_PID $LOAD_PID 2>/dev/null || true
              exit 1
            fi
          elif [ "$DELTA_COUNT" -eq 0 ]; then
            ZEROS=$((ZEROS + 1))
            [ "$LOAD_DONE" -eq 1 ] && LOAD_DONE_ZEROS=$((LOAD_DONE_ZEROS + 1))
          else
            ZEROS=0
            LOAD_DONE_ZEROS=0
          fi

          if [ "$KAFKA_COUNT" -ge "$COUNT" ]; then
            ELAPSED=$((NOW - START))
            AVG=$(awk "BEGIN { printf \"%.0f\", $COUNT / ($ELAPSED > 0 ? $ELAPSED : 1) }")
            kill -9 $RPCN_PID $LOAD_PID 2>/dev/null || true
            echo "---"
            printf "cores=%-10s  fetch=%-8s  poll=%s\n" "$CORES_LABEL" "{{.FETCH_SIZE}}" "{{.POLL}}"
            echo "Total messages : $KAFKA_COUNT / $COUNT"
            echo "Elapsed        : ${ELAPSED}s"
            echo "Avg throughput : ${AVG} msg/s"
            echo "RESULT cores=$CORES_LABEL fetch={{.FETCH_SIZE}} poll={{.POLL}} total=$KAFKA_COUNT elapsed=${ELAPSED}s avg=$AVG"
            break
          elif [ "$STARTED" -eq 1 ] && [ "$LOAD_DONE" -eq 1 ] && [ "$LOAD_DONE_ZEROS" -ge 8 ]; then
            # Loader finished and connector has been idle for 8 intervals â€” truly done
            ELAPSED=$((NOW - START))
            AVG=$(awk "BEGIN { printf \"%.0f\", ${KAFKA_COUNT:-0} / ($ELAPSED > 0 ? $ELAPSED : 1) }")
            kill -9 $RPCN_PID $LOAD_PID 2>/dev/null || true
            echo "---"
            printf "cores=%-10s  fetch=%-8s  poll=%s\n" "$CORES_LABEL" "{{.FETCH_SIZE}}" "{{.POLL}}"
            echo "Total messages : $KAFKA_COUNT / $COUNT  (incomplete)"
            echo "Elapsed        : ${ELAPSED}s"
            echo "Avg throughput : ${AVG} msg/s"
            echo "RESULT cores=$CORES_LABEL fetch={{.FETCH_SIZE}} poll={{.POLL}} total=$KAFKA_COUNT elapsed=${ELAPSED}s avg=$AVG incomplete=true"
            break
          elif [ "$STARTED" -eq 1 ] && [ "$LOAD_DONE" -eq 0 ] && [ "$ZEROS" -ge 8 ]; then
            # Loader still running but connector stalled â€” likely an error
            ELAPSED=$((NOW - START))
            AVG=$(awk "BEGIN { printf \"%.0f\", ${KAFKA_COUNT:-0} / ($ELAPSED > 0 ? $ELAPSED : 1) }")
            kill -9 $RPCN_PID $LOAD_PID 2>/dev/null || true
            echo "---"
            printf "cores=%-10s  fetch=%-8s  poll=%s\n" "$CORES_LABEL" "{{.FETCH_SIZE}}" "{{.POLL}}"
            echo "Total messages : $KAFKA_COUNT / $COUNT  (stalled)"
            echo "Elapsed        : ${ELAPSED}s"
            echo "Avg throughput : ${AVG} msg/s"
            echo "RESULT cores=$CORES_LABEL fetch={{.FETCH_SIZE}} poll={{.POLL}} total=$KAFKA_COUNT elapsed=${ELAPSED}s avg=$AVG incomplete=true"
            break
          fi

          PREV_COUNT=$KAFKA_COUNT
          PREV_TIME=$NOW
        done

  bench:matrix:
    desc: "Sweep fetch_size x cores x poll (e.g. task bench:matrix COUNT=500000 OUT=results.txt)"
    vars:
      COUNT: '{{.COUNT | default "500000"}}'
      OUT: '{{.OUT | default ""}}'
      MAX_IN_FLIGHT: '{{.MAX_IN_FLIGHT | default "10"}}'
      BATCH_COUNT: '{{.BATCH_COUNT | default "1000"}}'
    cmds:
      - |
        OUT_FILE="{{.OUT}}"
        HEADER=$(printf "%-10s  %-8s  %-10s  %-12s  %-10s  %s\n" "FETCH" "CORES" "POLL" "TOTAL" "ELAPSED" "AVG_MSG_S")
        echo "$HEADER"
        if [ -n "$OUT_FILE" ]; then
          printf "# count={{.COUNT}}  max_in_flight={{.MAX_IN_FLIGHT}}  batch_count={{.BATCH_COUNT}}\n" > "$OUT_FILE"
          echo "$HEADER" >> "$OUT_FILE"
        fi
        for fetch in 1000 10000 100000; do
          for cores in 1 2 4 8; do
            for poll in 100ms 500ms 1s; do
              OUTPUT=$(task bench:run COUNT={{.COUNT}} FETCH_SIZE=$fetch CORES=$cores POLL=$poll BATCH_COUNT={{.BATCH_COUNT}} MAX_IN_FLIGHT={{.MAX_IN_FLIGHT}} 2>&1) || true
              R=$(echo "$OUTPUT" | grep "^RESULT " || true)
              TOTAL=$(echo "$R" | grep -o 'total=[^ ]*' | cut -d= -f2 || true); TOTAL=${TOTAL:-ERROR}
              ELAPSED=$(echo "$R" | grep -o 'elapsed=[^ ]*' | cut -d= -f2 || true); ELAPSED=${ELAPSED:-?}
              AVG=$(echo "$R" | grep -o 'avg=[^ ]*' | cut -d= -f2 || true); AVG=${AVG:-0}
              ROW=$(printf "%-10s  %-8s  %-10s  %-12s  %-10s  %s\n" "$fetch" "$cores" "$poll" "$TOTAL" "$ELAPSED" "$AVG")
              echo "$ROW"
              if [ -n "$OUT_FILE" ]; then echo "$ROW" >> "$OUT_FILE"; fi
            done
          done
        done

  bench:test:skip-existing:
    desc: Verify connector skips pre-existing rows when HWM is set to current max ID
    cmds:
      - |
        if [ -z "$HANA_DSN" ]; then echo "HANA_DSN env var required"; exit 1; fi
        if [ -z "$HANA_SCHEMA" ]; then echo "HANA_SCHEMA env var required"; exit 1; fi
        TOPIC="rpcns-hana-bench-orders-inc-skip-test"
        PRELOAD=1000
        NEW_ROWS=100
        PASS=true

        pkill -9 -f "/tmp/rpcns-hana-inc-bench run" 2>/dev/null || true

        get_kafka_abs() {
          timeout 5 docker exec rpcns-hana-kafka kafka-get-offsets \
            --bootstrap-server localhost:29092 \
            --topic "$TOPIC" 2>/dev/null \
            | awk -F: '{sum += $3} END {print sum+0}' || echo 0
        }

        START_OFFSET=$(get_kafka_abs)

        # Create empty table then pre-load rows
        echo "Pre-loading $PRELOAD rows..."
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -setup-only
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -count "$PRELOAD"

        # Capture max ID â€” connector will start from here, skipping all pre-loaded rows
        MAX=$(HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -max-id)
        echo "Max ID after pre-load: $MAX (connector will start from here)"

        # Start connector with HWM_INITIAL=MAX
        HANA_DSN="$HANA_DSN" HANA_TABLE="BENCH_ORDERS_INC" HANA_SCHEMA="$HANA_SCHEMA" KAFKA_TOPIC="$TOPIC" \
          HWM_INITIAL="$MAX" POLL_INTERVAL="1s" \
          REDPANDA_LICENSE="$REDPANDA_LICENSE" REDPANDA_LICENSE_FILEPATH="$REDPANDA_LICENSE_FILEPATH" \
          /tmp/rpcns-hana-inc-bench run ./benchmark_config.yaml > /tmp/rpcns_hana_inc_skip_test.log 2>&1 &
        RPCN_PID=$!

        # Wait for connector to establish and complete first poll
        sleep 5

        COUNT=$(( $(get_kafka_abs) - START_OFFSET ))
        echo ""
        if [ "${COUNT:-0}" -eq 0 ]; then
          echo "PASS: 0 messages produced for $PRELOAD pre-existing rows (HWM correctly applied)"
        else
          echo "FAIL: $COUNT messages produced â€” connector read pre-existing rows"
          PASS=false
        fi

        # Now insert new rows â€” connector must pick these up
        echo "Inserting $NEW_ROWS new rows..."
        HANA_DSN="$HANA_DSN" HANA_SCHEMA="$HANA_SCHEMA" \
          /tmp/rpcns-hana-inc-bench-load -count "$NEW_ROWS"

        # Wait for connector to pick up new rows (up to 15s)
        DEADLINE=15
        ELAPSED=0
        while [ "$ELAPSED" -lt "$DEADLINE" ]; do
          sleep 2
          ELAPSED=$((ELAPSED + 2))
          COUNT=$(( $(get_kafka_abs) - START_OFFSET ))
          [ "${COUNT:-0}" -ge "$NEW_ROWS" ] && break
        done

        COUNT=$(( $(get_kafka_abs) - START_OFFSET ))
        if [ "${COUNT:-0}" -ge "$NEW_ROWS" ]; then
          echo "PASS: $COUNT / $NEW_ROWS new rows picked up by connector"
        else
          echo "FAIL: only $COUNT / $NEW_ROWS new rows appeared in Kafka"
          PASS=false
        fi

        kill -9 $RPCN_PID 2>/dev/null || true
        echo "---"
        [ "$PASS" = "true" ] && echo "ALL TESTS PASSED" || echo "SOME TESTS FAILED"

  logs:
    desc: Tail the last connector run log
    cmds:
      - tail -f /tmp/rpcns_hana_inc_bench.log

  logs:load:
    desc: Tail the last loader run log
    cmds:
      - tail -f /tmp/rpcns_hana_inc_load.log
