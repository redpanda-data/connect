version: "3"

silent: true

# Required env vars:
#   SNOWFLAKE_ACCOUNT       ORG-ACCOUNT identifier  (e.g. MYORG-MYACCOUNT)
#   SNOWFLAKE_USER          Snowflake user
#   SNOWFLAKE_DB            Target database
#   SNOWFLAKE_PRIVATE_KEY   PEM-encoded RSA private key content (used by bench:streaming/bench:bulk)
#   SNOWFLAKE_WAREHOUSE     Required for write/bulk only
#
# Optional:
#   SNOWFLAKE_ROLE               default: unset (uses user's default role, same as bare snowsql)
#   SNOWFLAKE_SCHEMA             default: RAW
#   SNOWFLAKE_PRIVATE_KEY_PATH   Path to PEM key file, for key-pair auth in setup/teardown (snowsql).
#                                Falls back to snowsql's default (password/MFA) if unset.

tasks:
  setup:
    desc: Create benchmark tables, stage, and pipe in Snowflake (requires snowsql in PATH)
    cmds:
      - snowsql -a "$SNOWFLAKE_ACCOUNT" -u "$SNOWFLAKE_USER" ${SNOWFLAKE_ROLE:+-r "$SNOWFLAKE_ROLE"} -d "$SNOWFLAKE_DB" -s "${SNOWFLAKE_SCHEMA:-RAW}" ${SNOWFLAKE_PRIVATE_KEY_PATH:+--private-key-path "$SNOWFLAKE_PRIVATE_KEY_PATH"} -f create.sql

  teardown:
    desc: Drop all benchmark objects (requires snowsql in PATH)
    cmds:
      - snowsql -a "$SNOWFLAKE_ACCOUNT" -u "$SNOWFLAKE_USER" ${SNOWFLAKE_ROLE:+-r "$SNOWFLAKE_ROLE"} -d "$SNOWFLAKE_DB" -s "${SNOWFLAKE_SCHEMA:-RAW}" ${SNOWFLAKE_PRIVATE_KEY_PATH:+--private-key-path "$SNOWFLAKE_PRIVATE_KEY_PATH"} -q "DROP TABLE IF EXISTS BENCH_EVENTS; DROP TABLE IF EXISTS BENCH_EVENTS_JSON; DROP STAGE IF EXISTS BENCH_STAGE; DROP PIPE IF EXISTS BENCH_PIPE;"

  bench:streaming:
    desc: |
      Run Snowpipe Streaming benchmark (delegates to write/streaming/Taskfile.yaml).
      Params: COUNT, BATCH, PERIOD, MAX_IN_FLIGHT, PARALLELISM, CHUNK_SIZE
      Example: task bench:streaming COUNT=1000000 BATCH=5000
    vars:
      COUNT: '{{.COUNT | default "2000000"}}'
      BATCH: '{{.BATCH | default "1000"}}'
      PERIOD: '{{.PERIOD | default "5s"}}'
      MAX_IN_FLIGHT: '{{.MAX_IN_FLIGHT | default "4"}}'
      PARALLELISM: '{{.PARALLELISM | default "1"}}'
      CHUNK_SIZE: '{{.CHUNK_SIZE | default "50000"}}'
    dir: write/streaming
    cmds:
      - task bench:run COUNT={{.COUNT}} BATCH={{.BATCH}} PERIOD={{.PERIOD}} MAX_IN_FLIGHT={{.MAX_IN_FLIGHT}} PARALLELISM={{.PARALLELISM}} CHUNK_SIZE={{.CHUNK_SIZE}}

  bench:streaming:matrix:
    desc: |
      Sweep BATCH/PARALLELISM/MAX_IN_FLIGHT/CHUNK_SIZE one at a time for Snowpipe Streaming
      (delegates to write/streaming/Taskfile.yaml bench:matrix).
      Params: COUNT, BATCHES, PARALLELS, MAX_IN_FLIGHTS, CHUNK_SIZES,
              DEFAULT_BATCH, DEFAULT_PARALLELISM, DEFAULT_MAX_IN_FLIGHT, DEFAULT_CHUNK_SIZE
      Example: task bench:streaming:matrix COUNT=1000000 PARALLELS="1 2 4 8"
    vars:
      COUNT: '{{.COUNT | default "2000000"}}'
      BATCHES: '{{.BATCHES | default "1000 2000 4000 8000 16000 32000 64000"}}'
      PARALLELS: '{{.PARALLELS | default "1 2 3 4 5 6 7 8"}}'
      MAX_IN_FLIGHTS: '{{.MAX_IN_FLIGHTS | default "1 2 4 8 16 32 64"}}'
      CHUNK_SIZES: '{{.CHUNK_SIZES | default "6250 12500 25000 50000 100000 200000 400000"}}'
      DEFAULT_BATCH: '{{.DEFAULT_BATCH | default "1000"}}'
      DEFAULT_PARALLELISM: '{{.DEFAULT_PARALLELISM | default "1"}}'
      DEFAULT_MAX_IN_FLIGHT: '{{.DEFAULT_MAX_IN_FLIGHT | default "4"}}'
      DEFAULT_CHUNK_SIZE: '{{.DEFAULT_CHUNK_SIZE | default "50000"}}'
    dir: write/streaming
    cmds:
      - task bench:matrix COUNT={{.COUNT}} BATCHES="{{.BATCHES}}" PARALLELS="{{.PARALLELS}}" MAX_IN_FLIGHTS="{{.MAX_IN_FLIGHTS}}" CHUNK_SIZES="{{.CHUNK_SIZES}}" DEFAULT_BATCH={{.DEFAULT_BATCH}} DEFAULT_PARALLELISM={{.DEFAULT_PARALLELISM}} DEFAULT_MAX_IN_FLIGHT={{.DEFAULT_MAX_IN_FLIGHT}} DEFAULT_CHUNK_SIZE={{.DEFAULT_CHUNK_SIZE}}

  bench:bulk:
    desc: |
      Run staged PUT + Snowpipe benchmark (delegates to write/bulk/Taskfile.yaml).
      Params: COUNT, BATCH, PERIOD, UPLOAD_THREADS
      Example: task bench:bulk COUNT=1000000 BATCH=5000
    vars:
      COUNT: '{{.COUNT | default "0"}}'
      BATCH: '{{.BATCH | default "1000"}}'
      PERIOD: '{{.PERIOD | default "5s"}}'
      UPLOAD_THREADS: '{{.UPLOAD_THREADS | default "4"}}'
    dir: write/bulk
    cmds:
      - task bench:run COUNT={{.COUNT}} BATCH={{.BATCH}} PERIOD={{.PERIOD}} UPLOAD_THREADS={{.UPLOAD_THREADS}}
