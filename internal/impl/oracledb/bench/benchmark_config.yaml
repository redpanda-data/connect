http:
  debug_endpoints: true

input:
  oracledb_cdc:
    connection_string: oracle://system:YourPassword123@localhost:1521/XE
    stream_snapshot: false
    snapshot_max_batch_size: 500
    logminer:
      scn_window_size: 85000
      backoff_interval: 2s
      mining_interval: 0s
    include:
      - TESTDB.USERS
      - TESTDB.PRODUCTS
      - TESTDB.CART
    batching:
      count: 30000
      period: 1s

output:
  processors:
    - benchmark:
        interval: 1s
        count_bytes: true
  file:
    path: "./results.json"
    codec: lines
  # stdout: {}
  # drop: {}

logger:
  level: INFO

metrics:
  prometheus:
    add_process_metrics: true
    add_go_metrics: true
