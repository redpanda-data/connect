# Debezium Server configuration for Oracle CDC benchmarking.
# No Kafka required. Switch between sink types by commenting/uncommenting below.
# - log:  zero overhead, count via: docker logs debezium-server 2>&1 | grep -c 'Received'
# - http: sends to bench-counter for live msgs/s display (docker logs -f bench-counter)

# Source: Oracle via LogMiner
debezium.source.connector.class=io.debezium.connector.oracle.OracleConnector
debezium.source.database.hostname=host.docker.internal
debezium.source.database.port=1521
debezium.source.database.user=system
debezium.source.database.password=YourPassword123
debezium.source.database.dbname=XE
debezium.source.topic.prefix=oracle-cdc
debezium.source.schema.include.list=TESTDB
debezium.source.table.include.list=TESTDB.USERS,TESTDB.PRODUCTS,TESTDB.CART
debezium.source.database.connection.adapter=logminer
debezium.source.log.mining.strategy=online_catalog
debezium.source.log.mining.batch.size.max=85000
debezium.source.log.mining.batch.size.default=85000
# Disable adaptive sleep between mining cycles for maximum throughput
debezium.source.log.mining.sleep.time.default.ms=0
debezium.source.log.mining.sleep.time.min.ms=0
debezium.source.log.mining.sleep.time.max.ms=0
debezium.source.log.mining.sleep.time.increment.ms=0
# Larger internal queue and batch size to reduce pipeline stalls
debezium.source.max.batch.size=8192
debezium.source.max.queue.size=32768
# Parallel record processing
debezium.source.record.processing.threads=4
debezium.source.snapshot.mode=no_data
debezium.source.decimal.handling.mode=string
debezium.source.time.precision.mode=connect
debezium.source.include.schema.changes=false
debezium.source.tombstones.on.delete=false

# Event format
debezium.format.value=json
debezium.format.key=json

# Sink: HTTP — sends to bench-counter for live msgs/s display
# debezium.sink.type=http
# debezium.sink.http.url=http://bench-counter:8080
# debezium.sink.http.timeout.ms=5000
# Sink: Kafka — uncomment to use instead of HTTP
debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=kafka:29092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Offset storage: local file (no Kafka needed)
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=5000

# Schema history: local file (no Kafka needed)
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat
