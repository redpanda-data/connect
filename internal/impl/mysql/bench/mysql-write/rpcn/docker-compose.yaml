services:
  # ── Kafka (KRaft, no ZooKeeper) ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: myrpc-kafka
    cpus: 3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 12

  # ── MySQL (benchmark sink target) ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myrpc-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: benchdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-ppassword", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Create bench-events Kafka topic ──────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.7.8
    container_name: myrpc-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic bench-events \
          --partitions 16 \
          --replication-factor 1
        echo "topic ready"

  # ── Create bench_events table in MySQL ───────────────────────────────────────
  mysql-setup:
    image: mysql:8.0
    container_name: myrpc-mysql-setup
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mysql -h mysql -u root -ppassword benchdb -e "
          CREATE TABLE IF NOT EXISTS bench_events (
            id       BIGINT,
            category VARCHAR(50),
            value    DOUBLE,
            ts       BIGINT
          );"
        echo "table ready"
