cache_resources:
  - label: checkpoint
    file:
      directory: ${CHECKPOINT_DIR:/tmp/rpcns_bench_checkpoint}

input:
  mysql_cdc:
    dsn: root:password@tcp(localhost:3306)/benchdb
    tables:
      - cart
    checkpoint_cache: checkpoint
    stream_snapshot: ${STREAM_SNAPSHOT:true}
    batching:
      count: ${BATCH_SIZE:1000}
      period: 1s

output:
  kafka_franz:
    seed_brokers:
      - localhost:9092
    topic: ${KAFKA_TOPIC:rpcns-bench-cart}

logger:
  level: WARN
