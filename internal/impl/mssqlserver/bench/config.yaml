http:
  debug_endpoints: true

input:
  microsoft_sql_server_cdc:
    connection_string: sqlserver://sa:YourStrong!Passw0rd@localhost:1433?database=testdb&encrypt=disable
    stream_snapshot: false
    include:
      # - dbo.users
      # - dbo.products
      - dbo.cart
    batching:
      count: 2000
      period: "1s"

output:
  processors:
    - benchmark:
        interval: 2s
        count_bytes: true
  drop: {}

logger:
  level: DEBUG
  add_timestamp: false

metrics:
  prometheus:
    add_process_metrics: true
    add_go_metrics: true
