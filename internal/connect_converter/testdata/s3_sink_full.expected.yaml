# Converted from Kafka Connect connector "s3-sink" (class=io.confluent.connect.s3.S3SinkConnector). Review # TODO markers.
input:
  redpanda:
    seed_brokers:
      - localhost:9092 # TODO: set your Redpanda/Kafka broker(s)
    topics:
      - test-topic
    consumer_group: connect-s3-sink # TODO: confirm consumer group
output:
  aws_s3:
    bucket: confluent-kafka-connect-s3-testing
    region: us-west-2
    path: ${! @kafka_topic }/${! timestamp_unix() }-${! uuid_v4() }.avro # TODO: add an encode step (e.g. avro/parquet) before this output
    batching:
      count: 3
