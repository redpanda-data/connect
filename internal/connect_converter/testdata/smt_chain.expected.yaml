# Converted from Kafka Connect connector "s3" (class=io.confluent.connect.s3.S3SinkConnector). Review # TODO markers.
input:
  stdin: {} # TODO: set the input that feeds this pipeline (e.g. your source topic)
pipeline:
  processors:
    - mapping: meta kafka_topic = metadata("kafka_topic").re_replace_all("(.*)", "prefix_$1")
    - mapping: root.src = "kafka"
output:
  aws_s3:
    bucket: my-bucket
    region: us-east-1
    path: ${! @kafka_topic }/${! timestamp_unix() }-${! uuid_v4() }.json # TODO: review object path/partitioning
