version: '3'

vars:
  GOBIN:
    sh: mkdir -p {{.TOOLS_BIN_DIR}} && realpath {{.TOOLS_BIN_DIR}}

tasks:
  install-all:
    deps:
      - install-githooks
      - install-golangci-lint
      - install-yamlfmt

  install-githooks:
    desc: Configure git to use .githooks directory
    run: once
    cmds:
      - git config core.hooksPath .githooks

  install-golangci-lint:
    desc: Install golangci-lint
    required:
      vars:
        - GOLANGCI_LINT_VERSION
    run: once
    silent: true
    sources:
      - .versions
    cmds:
      - GOBIN={{.GOBIN}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.GOLANGCI_LINT_VERSION}}

  install-yamlfmt:
    desc: Install yamlfmt
    run: once
    silent: true
    cmds:
      - GOBIN={{.GOBIN}} go install github.com/google/yamlfmt/cmd/yamlfmt@v{{.YAMLFMT_VERSION}}
