version: '3'

tasks:
  unit:
    desc: Run unit tests
    aliases:
      - ut
    vars:
      TIMEOUT: '{{if .CI}}5m{{else}}1m{{end}}'
    cmds:
      - go test {{.GO_FLAGS}} -timeout {{.TIMEOUT}} -shuffle=on {{if .CI}}{{else}}-v{{end}} ./...

  unit-race:
    desc: Run unit tests with race detection
    aliases:
      - ut-race
    cmds:
      - go test {{.GO_FLAGS}} -timeout 3m -shuffle=on -race {{if .CI}}{{else}}-v{{end}} ./...

  integration:
    desc: "Run integration tests (e.g. task test:integration -- aws kafka). See cmd/tools/integration/README.md"
    aliases:
      - it
    cmds:
      - go run ./cmd/tools/integration run {{.CLI_ARGS}}

  show:
    desc: "Show human-readable output for a test failure (e.g. task test:show -- .integration/20260331/mssql.txt:870)"
    cmds:
      - go run ./cmd/tools/integration show {{.CLI_ARGS}}

  template:
    desc: Run template tests
    aliases:
      - tmpl
    deps:
      - :build:redpanda-connect
    vars:
      TEMPLATE_FILES:
        sh: find internal/impl -type f -name "*tmpl.yaml" | tr '\n' ' '
    cmds:
      - '{{.TARGET_DIR}}/redpanda-connect template lint {{.TEMPLATE_FILES}}'
      - '{{.TARGET_DIR}}/redpanda-connect test ./config/test/...'
      - '{{.TARGET_DIR}}/redpanda-connect template lint ./config/rag/templates/...'

