openapi: 3.0.3
info:
  title: Notion API
  version: 1.0.0
  termsOfService: https://notion.notion.site/Terms-and-Privacy-28ffdd083dc3473e9c2da6ec011b58ac
servers:
  - url: https://api.notion.com
security:
  - bearerAuth: []
tags:
  - name: Databases
    description: Database endpoints
  - name: Data sources
    description: Data source endpoints
  - name: Pages
    description: Page endpoints
  - name: Blocks
    description: Block endpoints
  - name: Comments
    description: Comment endpoints
  - name: File uploads
    description: File upload endpoints
  - name: OAuth
    description: OAuth endpoints (basic authentication)
  - name: Users
    description: User endpoints
  - name: Search
    description: Search endpoints
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    basicAuth:
      type: http
      scheme: basic
  schemas:
    AnnotationRequest:
      type: object
      properties:
        bold:
          type: boolean
          description: Whether the text is formatted as bold.
        italic:
          type: boolean
          description: Whether the text is formatted as italic.
        strikethrough:
          type: boolean
          description: Whether the text is formatted with a strikethrough.
        underline:
          type: boolean
          description: Whether the text is formatted with an underline.
        code:
          type: boolean
          description: Whether the text is formatted as code.
        color:
          $ref: "#/components/schemas/ApiColor"
          description: The color of the text.
    AnnotationResponse:
      type: object
      properties:
        bold:
          type: boolean
        italic:
          type: boolean
        strikethrough:
          type: boolean
        underline:
          type: boolean
        code:
          type: boolean
        color:
          $ref: "#/components/schemas/ApiColor"
      required:
        - bold
        - italic
        - strikethrough
        - underline
        - code
        - color
    ApiColor:
      type: string
      enum:
        - default
        - gray
        - brown
        - orange
        - yellow
        - green
        - blue
        - purple
        - pink
        - red
        - default_background
        - gray_background
        - brown_background
        - orange_background
        - yellow_background
        - green_background
        - blue_background
        - purple_background
        - pink_background
        - red_background
    ApiTranscriptionStatus:
      type: string
      enum:
        - transcription_not_started
        - transcription_paused
        - transcription_in_progress
        - summary_in_progress
        - notes_ready
    AppendBlockChildrenRequest:
      type: object
      properties:
        children:
          type: array
          items:
            $ref: "#/components/schemas/BlockObjectRequest"
        after:
          type: string
        position:
          $ref: "#/components/schemas/ContentPositionSchema"
      required:
        - children
    AppendBlockChildrenResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - block
        block:
          type: object
        object:
          type: string
          enum:
            - list
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
        results:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
                enum:
                  - block
              id:
                type: string
              type:
                type: string
                enum:
                  - paragraph
                  - heading_1
                  - heading_2
                  - heading_3
                  - bulleted_list_item
                  - numbered_list_item
                  - quote
                  - to_do
                  - toggle
                  - template
                  - synced_block
                  - child_page
                  - child_database
                  - equation
                  - code
                  - callout
                  - divider
                  - breadcrumb
                  - table_of_contents
                  - column_list
                  - column
                  - link_to_page
                  - table
                  - table_row
                  - transcription
                  - embed
                  - bookmark
                  - image
                  - video
                  - pdf
                  - file
                  - audio
                  - link_preview
                  - unsupported
              paragraph:
                $ref: "#/components/schemas/ContentWithRichTextAndColorResponse"
              parent:
                $ref: "#/components/schemas/ParentForBlockBasedObjectResponse"
              created_time:
                type: string
              created_by:
                $ref: "#/components/schemas/PartialUserObjectResponse"
              last_edited_time:
                type: string
              last_edited_by:
                $ref: "#/components/schemas/PartialUserObjectResponse"
              has_children:
                type: boolean
              archived:
                type: boolean
              in_trash:
                type: boolean
              heading_1:
                $ref: "#/components/schemas/HeaderContentWithRichTextAndColorResponse"
              heading_2:
                $ref: "#/components/schemas/HeaderContentWithRichTextAndColorResponse"
              heading_3:
                $ref: "#/components/schemas/HeaderContentWithRichTextAndColorResponse"
              bulleted_list_item:
                $ref: "#/components/schemas/ContentWithRichTextAndColorResponse"
              numbered_list_item:
                $ref: "#/components/schemas/ContentWithRichTextAndColorAndListResponse"
              quote:
                $ref: "#/components/schemas/ContentWithRichTextAndColorResponse"
              to_do:
                type: object
                properties:
                  rich_text:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichTextItemResponse"
                  color:
                    $ref: "#/components/schemas/ApiColor"
                  checked:
                    type: boolean
                required:
                  - rich_text
                  - color
                  - checked
              toggle:
                $ref: "#/components/schemas/ContentWithRichTextAndColorResponse"
              template:
                type: object
                properties:
                  rich_text:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichTextItemResponse"
                required:
                  - rich_text
              synced_block:
                type: object
                properties:
                  synced_from:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - block_id
                      block_id:
                        type: string
                    required:
                      - type
                      - block_id
                    nullable: true
                required:
                  - synced_from
              child_page:
                $ref: "#/components/schemas/TitleObjectResponse"
              child_database:
                $ref: "#/components/schemas/TitleObjectResponse"
              equation:
                $ref: "#/components/schemas/ExpressionObjectResponse"
              code:
                type: object
                properties:
                  rich_text:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichTextItemResponse"
                  caption:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichTextItemResponse"
                  language:
                    $ref: "#/components/schemas/LanguageRequest"
                required:
                  - rich_text
                  - caption
                  - language
              callout:
                type: object
                properties:
                  rich_text:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichTextItemResponse"
                  color:
                    $ref: "#/components/schemas/ApiColor"
                  icon:
                    $ref: "#/components/schemas/PageIconResponse"
                    nullable: true
                required:
                  - rich_text
                  - color
                  - icon
              divider:
                type: object
              breadcrumb:
                type: object
              table_of_contents:
                type: object
                properties:
                  color:
                    $ref: "#/components/schemas/ApiColor"
                required:
                  - color
              column_list:
                type: object
              column:
                $ref: "#/components/schemas/ColumnResponse"
              link_to_page:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - page_id
                      - database_id
                      - comment_id
                  page_id:
                    type: string
                  database_id:
                    type: string
                  comment_id:
                    type: string
                required:
                  - type
              table:
                $ref: "#/components/schemas/ContentWithTableResponse"
              table_row:
                $ref: "#/components/schemas/ContentWithTableRowResponse"
              transcription:
                $ref: "#/components/schemas/TranscriptionBlockResponse"
              embed:
                $ref: "#/components/schemas/MediaContentWithUrlAndCaptionResponse"
              bookmark:
                $ref: "#/components/schemas/MediaContentWithUrlAndCaptionResponse"
              image:
                $ref: "#/components/schemas/MediaContentWithFileAndCaptionResponse"
              video:
                $ref: "#/components/schemas/MediaContentWithFileAndCaptionResponse"
              pdf:
                $ref: "#/components/schemas/MediaContentWithFileAndCaptionResponse"
              file:
                $ref: "#/components/schemas/MediaContentWithFileNameAndCaptionResponse"
              audio:
                $ref: "#/components/schemas/MediaContentWithFileAndCaptionResponse"
              link_preview:
                $ref: "#/components/schemas/MediaContentWithUrlResponse"
              unsupported:
                type: object
            required:
              - object
              - id
      required:
        - type
        - block
        - object
        - next_cursor
        - has_more
        - results
    ArrayBasedPropertyValueResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - title
            - rich_text
            - people
            - relation
        title:
          type: array
          items:
            $ref: "#/components/schemas/RichTextItemResponse"
        rich_text:
          type: array
          items:
            $ref: "#/components/schemas/RichTextItemResponse"
        people:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
                enum:
                  - user
                  - group
                description: Always `user`
              name:
                type: string
                nullable: true
                description: The name of the user.
              avatar_url:
                type: string
                nullable: true
                description: The avatar URL of the user.
              type:
                type: string
                enum:
                  - person
                  - bot
                description: Indicates this user is a person.
              person:
                type: object
                properties:
                  email:
                    type: string
                    description: The email of the person.
                description: Details about the person, when the `type` of the user is `person`.
              bot:
                description: Details about the bot, when the `type` of the user is `bot`.
                type: object
                properties:
                  owner:
                    description: Details about the owner of the bot.
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - user
                          - workspace
                        description: Always `user`
                      user:
                        description: Details about the owner of the bot, when the `type` of the owner is `user`. This means // the bot is for a
                          integration.
                        type: object
                        properties:
                          id:
                            type: string
                            description: The ID of the user.
                          object:
                            type: string
                            enum:
                              - user
                            description: The user object type name.
                          name:
                            type: string
                            nullable: true
                            description: The name of the user.
                          avatar_url:
                            type: string
                            nullable: true
                            description: The avatar URL of the user.
                          type:
                            type: string
                            enum:
                              - person
                            description: The type of the user.
                          person:
                            type: object
                            properties:
                              email:
                                type: string
                                description: The email of the person.
                            description: The person info of the user.
                        required:
                          - id
                          - object
                      workspace:
                        type: boolean
                        enum:
                          - true
                        description: Details about the owner of the bot, when the `type` of the owner is `workspace`. This // means the bot is
                          for an internal integration.
                    required:
                      - type
                  workspace_id:
                    type: string
                    description: The ID of the bot's workspace.
                  workspace_limits:
                    type: object
                    properties:
                      max_file_upload_size_in_bytes:
                        type: number
                        description: The maximum allowable size of a file upload, in bytes
                    required:
                      - max_file_upload_size_in_bytes
                    description: Limits and restrictions that apply to the bot's workspace
                  workspace_name:
                    type: string
                    nullable: true
                    description: The name of the bot's workspace.
            required:
              - id
              - object
        relation:
          type: array
          items:
            $ref: "#/components/schemas/RelationItemPropertyValueResponse"
      required:
        - type
