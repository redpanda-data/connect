              description: The ID of the bot's workspace.
            workspace_limits:
              type: object
              properties:
                max_file_upload_size_in_bytes:
                  type: number
                  description: The maximum allowable size of a file upload, in bytes
              required:
                - max_file_upload_size_in_bytes
              description: Limits and restrictions that apply to the bot's workspace
            workspace_name:
              type: string
              nullable: true
              description: The name of the bot's workspace.
      required:
        - id
        - object
    VerificationPropertyConfigurationRequest:
      type: object
      properties:
        type:
          type: string
          enum:
            - verification
          description: Always `verification`
        verification:
          type: object
      required:
        - verification
    VerificationPropertyItemObjectResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - verification
        verification:
          $ref: "#/components/schemas/VerificationPropertyValueResponse"
          nullable: true
        object:
          type: string
          enum:
            - property_item
        id:
          type: string
      required:
        - type
        - verification
        - object
        - id
    VerificationPropertyResponse:
      type: object
      properties:
        state:
          type: string
          enum:
            - verified
            - expired
          description: "One of: `verified`, `expired`"
        date:
          $ref: "#/components/schemas/DateResponse"
          nullable: true
        verified_by:
          $ref: "#/components/schemas/PartialUserObjectResponse"
          nullable: true
      required:
        - state
        - date
        - verified_by
    VerificationPropertyStatusFilter:
      type: object
      properties:
        status:
          type: string
          enum:
            - verified
            - expired
            - none
      required:
        - status
    VerificationPropertyUnverifiedResponse:
      type: object
      properties:
        state:
          type: string
          enum:
            - unverified
          description: Always `unverified`
        date:
          nullable: true
        verified_by:
          nullable: true
      required:
        - state
        - date
        - verified_by
    VerificationPropertyValueResponse:
      type: object
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
          description: Always `unverified`
        date:
          nullable: true
        verified_by:
          nullable: true
      required:
        - state
        - date
        - verified_by
    VerificationSimplePropertyValueResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - verification
          description: Always `verification`
        verification:
          $ref: "#/components/schemas/VerificationPropertyValueResponse"
          nullable: true
      required:
        - type
        - verification
    VideoBlockObjectResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - video
        video:
          $ref: "#/components/schemas/MediaContentWithFileAndCaptionResponse"
        parent:
          $ref: "#/components/schemas/ParentForBlockBasedObjectResponse"
        object:
          type: string
          enum:
            - block
        id:
          type: string
        created_time:
          type: string
        created_by:
          $ref: "#/components/schemas/PartialUserObjectResponse"
        last_edited_time:
          type: string
        last_edited_by:
          $ref: "#/components/schemas/PartialUserObjectResponse"
        has_children:
          type: boolean
        archived:
          type: boolean
        in_trash:
          type: boolean
      required:
        - type
        - video
        - parent
        - object
        - id
        - created_time
        - created_by
        - last_edited_time
        - last_edited_by
        - has_children
        - archived
        - in_trash
    WorkspaceParentForBlockBasedObjectResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - workspace
          description: The parent type.
        workspace:
          type: boolean
          enum:
            - true
          description: Always true for workspace parent.
      required:
        - type
        - workspace
security:
  - bearerAuth: []
tags:
  - name: Users
    description: >-
      All actions in a Notion workspace are associated to a [user](https://developers.notion.com/reference/user),
      whether it be a bot via a [Notion integration](https://developers.notion.com/docs/getting-started) or a person
      interacting with Notion’s UI.


      These endpoints allow developers to interact with users programmatically by [listing all
      users](https://developers.notion.com/reference/get-user), [retrieving information about your integration’s
      bot](https://developers.notion.com/reference/get-self), or [retrieving a specific
      user](https://developers.notion.com/reference/get-user) in your Notion workspace.


      To learn more, read [Notion’s official documentation](https://developers.notion.com/reference/user) for endpoints
      related to users.
  - name: Databases
    description: >-
      Databases represent collections of Notion pages that can be
      [sorted](https://developers.notion.com/reference/post-database-query-sort) and
      [queried](https://developers.notion.com/reference/post-database-query). Each database will have a schema (or
      properties) that represent the columns in the database table. Notion offers several types of properties, as
      described in the [official documentation](https://developers.notion.com/reference/property-object).


      These database-related endpoints allow developers to work with databases programmatically by
      [creating](https://developers.notion.com/reference/create-a-database),
      [retrieving](https://developers.notion.com/reference/retrieve-a-database), and
      [updating](https://developers.notion.com/reference/update-a-database) them.


      To learn more, read [Notion’s official documentation](https://developers.notion.com/reference/database) for
      endpoints related to databases. We also recommend reading the official Notion guide for [working with
      databases](https://developers.notion.com/docs/working-with-page-content).
  - name: Pages
    description: >-
      Pages represent documents in Notion workspaces that can be created in a workspace directly or organized within in
      a Notion database.


      These page-related endpoints allow developers to work with pages programmatically by
      [creating](https://developers.notion.com/reference/post-page),
      [retrieving](https://developers.notion.com/reference/retrieve-a-page),
      [updating](https://developers.notion.com/reference/patch-page), and
      [archiving](https://developers.notion.com/reference/archive-a-page) them.


      To learn more, read [Notion’s official documentation](https://developers.notion.com/reference/page) for endpoints
      related to pages. We also recommend reading the official Notion guide for [working with page
      content](https://developers.notion.com/docs/working-with-page-content).
  - name: Blocks
    description: >-
      A block represents a piece of content in a Notion workspace. All Notion pages are composed of a series of blocks.
      Blocks can vary in type, including (but not limited to) headers, styled text, images, tables, and more. To see a
      complete list of block types, refer to Notion’s [official
      documentation](https://developers.notion.com/reference/page-property-values#type-objects).


      These block-related endpoints allow developers to work with blocks programmatically by
      [creating](https://developers.notion.com/reference/patch-block-children),
      [retrieving](https://developers.notion.com/reference/retrieve-a-block),
      [updating](https://developers.notion.com/reference/update-a-block), and
      [deleting](https://developers.notion.com/reference/delete-a-block) them from Notion pages.


      To learn more, read [Notion’s official documentation](https://developers.notion.com/reference/block) for endpoints
      related to blocks. We also recommend reading the official Notion guides for [working with page
      content](https://developers.notion.com/docs/working-with-page-content) (a.k.a. blocks) and [working with files and
      media](https://developers.notion.com/docs/working-with-files-and-media).
  - name: Search
    description: Search all pages and databases shared with your Notion integration. To learn more, read Notion’s [official
      documentation](https://developers.notion.com/reference/post-search) for the Public API endpoints.
  - name: Comments
    description: >-
      [Comments](https://developers.notion.com/reference/comment-object) can be added to a page or inline (i.e., to
      blocks).  

      These comment-related endpoints allow developers to work with comments programmatically by
      [creating](https://developers.notion.com/reference/create-a-comment) and
      [retrieving](https://developers.notion.com/reference/retrieve-a-block) them.  
        
      To learn more, read [Notion’s official documentation](https://developers.notion.com/reference/comment-object) for
      endpoints related to comments. We also recommend reading the official Notion guide for [working with
      comments](https://developers.notion.com/docs/working-with-comments).
