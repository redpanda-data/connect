    post:
      summary: Upload a file
      operationId: V1FileUploadsFileUploadIDSendPost
      tags:
        - File uploads
      x-codeSamples:
        - lang: javascript
          label: TypeScript SDK
          source: |-
            import { Client } from "@notionhq/client"

            const notion = new Client({ auth: process.env.NOTION_API_KEY })

            import { readFile } from "fs/promises"
            import { basename } from "path"

            const filePath = "./document.pdf"

            const response = await notion.fileUploads.send({
              file_upload_id: "a02fc1d3-db8b-45c5-a222-27595b15aea7",
              file: {
                filename: basename(filePath),
                data: new Blob([await readFile(filePath)], {
                  type: "application/pdf"
                })
              }
            })
      parameters:
        - name: file_upload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/idRequest"
            description: Identifier for a Notion file upload object.
        - $ref: "#/components/parameters/notionVersion"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: object
                  properties: {}
                  description: The raw binary file contents to upload.
                part_number:
                  type: string
                  description: When uploading files greater than 20MB in parts, this is the current part number. Must be an integer
                    between 1 and 1,000.
              required:
                - file
