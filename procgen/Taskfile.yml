version: "3"

tasks:
  openapi:
    desc: Convert Postman collection to OpenAPI spec and enrich with TS SDK types
    cmds:
      - bunx p2o "postman_collection.json" -f openapi.yaml
      - bun run ts-to-openapi.ts
    sources:
      - postman_collection.json
      - notion-api-endpoints.ts
      - ts-to-openapi.ts
    generates:
      - openapi.yaml
    silent: true

  api:
    desc: Generate Go client from OpenAPI spec
    deps: [openapi]
    cmds:
      - go run github.com/ogen-go/ogen/cmd/ogen --config ogen.yaml --target api --clean openapi.yaml
    sources:
      - openapi.yaml
      - ogen.yaml
    generates:
      - api/**/*.go
