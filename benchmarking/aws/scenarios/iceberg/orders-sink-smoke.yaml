name: iceberg-orders-sink-smoke
description: |
  1-vCPU smoke for the iceberg sink bench (Connect + Kafka Connect). Small
  pre-seeded dataset sized so a single vCPU still clears the 15-minute floor at
  a conservative ~15 MB/s estimate. Use this to validate the Glue REST + SigV4
  path on both engines before the full sweep.

direction: sink
connector: iceberg
stack: iceberg

infra:
  runner:
    instance_type: c8g.4xlarge

dataset:
  initial_rows: 12000000    # ~13.7 GiB at 1200 B/row → ~915 s at 15 MB/s ≥ 15 min
  row_size_bytes: 1200
  seeder: json-orders
  expected_peak_mb_s: 15

pipeline:
  # 1-vCPU smoke mirroring the primary order-preserving sweep (orders-sink.yaml):
  # Recipe A memory buffer + output batching. The buffer merges partitions into
  # one ordered stream; output batching lets max_in_flight=16 feed the iceberg
  # committer's coalescer (without it, a single buffer stream starves the
  # committer — measured 0.8 MB/s vs 12.7 with it, 2026-07-08). For the unordered
  # Recipe B variant see orders-sink-recipe-b.yaml.
  buffer:
    memory:
      limit: 524288000   # 500 MiB; size to throughput x commit interval
      batch_policy:
        count: 10000
        period: 10s
  output:
    iceberg:
      max_in_flight: 16
      batching:
        count: 10000
        period: 10s
      commit:
        max_snapshot_age: 24h

matrix:
  cpu_points: [1]
