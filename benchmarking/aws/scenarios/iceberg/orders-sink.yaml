name: iceberg-orders-sink
description: |
  Drain a pre-seeded Redpanda topic of flat JSON records into an Apache Iceberg
  table (AWS Glue REST catalog + S3) and compare Connect's iceberg output against
  the Kafka Connect Iceberg sink, head-to-head across a vCPU sweep. Throughput is
  the Iceberg table's committed-bytes growth (total-files-size), polled from Glue.
  Both engines reach Glue via the same REST endpoint + SigV4 (service=glue), so
  the comparison is apples-to-apples. Bounded dataset (no sustained workload):
  the topic is the fixed input; each sweep point re-reads it from the beginning.

direction: sink
connector: iceberg
stack: iceberg

infra:
  runner:
    instance_type: c8g.4xlarge

dataset:
  initial_rows: 160000000   # ~180 GiB at 1200 B/row → ≥15 min at 200 MB/s (8 vCPU)
  row_size_bytes: 1200
  seeder: json-orders
  expected_peak_mb_s: 200

pipeline:
  # sinkTopology injects the redpanda INPUT (the pre-seeded topic) and the
  # iceberg catalog/storage/table config from TF outputs + BenchNames. The
  # scenario supplies input-side tuning (input_options, merged into the
  # redpanda input) and output-side tuning.
  #
  # FAIR HEAD-TO-HEAD vs Kafka Connect: KC's Tabular sink commits every 10s via
  # its coordinator. We match that cadence with input-side batching so each
  # Connect commit carries ~10s of records (per-partition read-ahead batches)
  # instead of the ~300/commit the defaults backpressure us into. This brings
  # Connect to a sensible production config rather than comparing default-vs-
  # tuned. (Measured ~110x over baseline in isolation; output_sent ~46k rec/s
  # at 1 vCPU.) NOTE: unordered_processing trades cross-partition ordering —
  # acceptable for a sink; the buffer variant is the order-preserving equivalent.
  input_options:
    unordered_processing:
      enabled: true
      checkpoint_limit: 100000
      batching:
        count: 50000
        period: 10s
  output:
    iceberg:
      max_in_flight: 8
      batching:
        count: 50000
        period: 10s

matrix:
  cpu_points: [1, 2, 4, 8]
