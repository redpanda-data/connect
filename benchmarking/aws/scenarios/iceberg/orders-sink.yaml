name: iceberg-orders-sink
description: |
  Drain a pre-seeded Redpanda topic of flat JSON records into an Apache Iceberg
  table (AWS Glue REST catalog + S3) and compare Connect's iceberg output against
  the Kafka Connect Iceberg sink, head-to-head across a vCPU sweep. Throughput is
  the Iceberg table's committed-bytes growth (total-files-size), polled from Glue.
  Both engines reach Glue via the same REST endpoint + SigV4 (service=glue), so
  the comparison is apples-to-apples. Bounded dataset (no sustained workload):
  the topic is the fixed input; each sweep point re-reads it from the beginning.

direction: sink
connector: iceberg
stack: iceberg

infra:
  runner:
    instance_type: c8g.4xlarge

dataset:
  initial_rows: 160000000   # ~180 GiB at 1200 B/row → ≥15 min at 200 MB/s (8 vCPU)
  row_size_bytes: 1200
  seeder: json-orders
  expected_peak_mb_s: 200

pipeline:
  # sinkTopology injects the redpanda INPUT (the pre-seeded topic) and the
  # iceberg catalog/storage/table config from TF outputs + BenchNames.
  #
  # Recipe A (order-preserving) + output batching — the config validated in the
  # 2026-07-08 1-vCPU smoke (Connect 12.7 MB/s mean, edging KC). A memory buffer
  # merges all partitions into one ordered stream (decouples the fast input from
  # the commit-bound output); output-level batching then groups each commit and
  # lets max_in_flight=16 dispatch concurrent writers, feeding the iceberg
  # committer's coalescer. FAIR vs KC (whose coordinator commits every 10s): we
  # match that 10s cadence and preserve cross-partition order (no
  # unordered_processing).
  buffer:
    memory:
      limit: 524288000   # 500 MiB; size to throughput x commit interval
      batch_policy:
        count: 10000
        period: 10s
  output:
    iceberg:
      max_in_flight: 16
      batching:
        count: 10000
        period: 10s
      commit:
        max_snapshot_age: 24h

matrix:
  cpu_points: [1, 2, 4, 8]
