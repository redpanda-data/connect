name: postgres-orders-cdc
description: |
  Stream changes from a Postgres orders table under sustained heavy writes
  (target 150K writes/sec ≈ 180 MB/s) so the postgres_cdc input — not the
  producer — is the bottleneck across the whole CPU sweep. TRUNCATE between
  sweep points keeps the table size bounded (no Trap 3).

connector: postgres_cdc
stack: postgres

infra:
  source:
    instance_class: db.r6g.2xlarge
    storage_gb: 400
    iops: 12000
    parameters:
      rds.logical_replication: "1"
      max_wal_senders: "20"
  runner:
    instance_type: c8g.4xlarge

dataset:
  initial_rows: 0          # TRUNCATE-before-every-point makes a seed pointless;
                           # ensureTable still runs to CREATE the table.
  row_size_bytes: 1200
  tables: [orders]
  seeder: cdc-rows

workload:
  write_rate_per_sec: 150000
  duration: 15m
  warmup: 2m

pipeline:
  input:
    postgres_cdc:
      dsn: ${POSTGRES_DSN}
      tls:
        skip_cert_verify: true   # RDS-internal CA isn't in the runner image; postgres_cdc uses NewTLSField (no `enabled` toggle)
      stream_snapshot: false
      schema: public
      tables: [orders]
      slot_name: bench_slot
      batching:
        count: 5000
        period: 1s

matrix:
  cpu_points: [1, 2, 4, 8]

reset:
  # Drop both engines' replication slots AND truncate the table between
  # sweep points. Slot drops free the WAL cursor so the next point starts
  # at current position; the TRUNCATE keeps table size bounded (no Trap 3
  # like bucket-1 hit). kc_bench_slot is what the Debezium registry entry
  # in kcconnectors.go pins, so it must be dropped explicitly even when
  # Connect is the only engine being swept.
  - sql: "SELECT pg_drop_replication_slot('bench_slot') FROM pg_replication_slots WHERE slot_name='bench_slot'"
  - sql: "SELECT pg_drop_replication_slot('kc_bench_slot') FROM pg_replication_slots WHERE slot_name='kc_bench_slot'"
  - sql: "TRUNCATE TABLE orders"
