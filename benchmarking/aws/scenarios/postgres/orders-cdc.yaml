name: postgres-orders-cdc
description: |
  Stream changes from a 75M-row orders table under sustained heavy writes
  (target 80K writes/sec ≈ 96 MB/s) so the postgres_cdc input — not the
  producer — is the bottleneck, and the CPU sweep can find its ceiling.

connector: postgres_cdc
stack: postgres

infra:
  source:
    instance_class: db.r6g.2xlarge
    storage_gb: 400
    iops: 12000
    parameters:
      rds.logical_replication: "1"
      max_wal_senders: "20"
  runner:
    instance_type: c8g.4xlarge

dataset:
  initial_rows: 75000000
  row_size_bytes: 1200
  tables: [orders]
  seeder: cdc-rows

workload:
  write_rate_per_sec: 80000
  duration: 15m
  warmup: 2m

pipeline:
  input:
    postgres_cdc:
      dsn: ${POSTGRES_DSN}
      tls:
        skip_cert_verify: true   # RDS-internal CA isn't in the runner image; postgres_cdc uses NewTLSField (no `enabled` toggle)
      stream_snapshot: false
      schema: public
      tables: [orders]
      slot_name: bench_slot
      batching:
        count: 5000
        period: 1s

matrix:
  cpu_points: [1, 2, 4, 8]

reset:
  - sql: "SELECT pg_drop_replication_slot('bench_slot') FROM pg_replication_slots WHERE slot_name='bench_slot'"
