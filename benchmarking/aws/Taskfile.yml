version: '3'

vars:
  RUNNER: 'go run ./benchmarking/aws/runner'

tasks:
  aws:bench:
    desc: "Run a scenario end-to-end (provision → sweep → render → teardown)"
    dir: '.'
    cmds:
      - |
        if [ -z "{{.scenario}}" ]; then
          echo "usage: task aws:bench -- scenario=<path>"
          exit 2
        fi
        cd ../.. && {{.RUNNER}} bench \
          --scenario=benchmarking/aws/scenarios/{{.scenario}}.yaml \
          --repo-root=.

  aws:validate:
    desc: "Validate a scenario YAML + terraform plan (no AWS spend)"
    cmds:
      - |
        if [ -z "{{.scenario}}" ]; then
          echo "usage: task aws:validate -- scenario=<path>"
          exit 2
        fi
        cd ../.. && {{.RUNNER}} validate \
          --scenario=benchmarking/aws/scenarios/{{.scenario}}.yaml

  aws:down:
    desc: "Tear down infra for a scenario (when bench was run with keep=true)"
    cmds:
      - |
        if [ -z "{{.scenario}}" ]; then
          echo "usage: task aws:down -- scenario=<path>"
          exit 2
        fi
        cd ../.. && {{.RUNNER}} down \
          --scenario=benchmarking/aws/scenarios/{{.scenario}}.yaml \
          --repo-root=.

  aws:cost-check:
    desc: "Show AWS Cost Explorer spend for the bench project (today/7d/MTD)"
    cmds:
      - cd ../.. && {{.RUNNER}} cost-check

  aws:summary:
    desc: "Regenerate the auto-managed AWS section in docs/benchmark-results/SUMMARY.md"
    cmds:
      - cd ../.. && {{.RUNNER}} summary --repo-root=.

  aws:tf-clean:
    desc: "Remove .terraform/ caches under benchmarking/aws/terraform/ (use when a backend or provider config change confuses init)"
    cmds:
      - find terraform -type d -name '.terraform' -exec rm -rf {} +
      - find terraform -type f -name '.terraform.lock.hcl' -delete
      - echo "terraform caches cleaned; next aws:bench will re-init"
